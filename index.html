<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ORION AI v2.0 - Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
        
        :root {
            --bg: #020408;
            --glass: rgba(10, 15, 30, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --orion-blue: #3a86ff;
            --orion-purple: #8338ec;
            --gold: #ffbe0b;
            --green: #06d6a0;
            --red: #ef476f;
            --text: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(circle at 80% 10%, rgba(58,134,255,0.15), transparent),
                              radial-gradient(circle at 10% 90%, rgba(131,56,236,0.1), transparent);
        }

        /* STAR-MAN VISUAL */
        .star-man {
            position: fixed; bottom: -20px; right: -30px; width: 220px; height: 350px;
            background: linear-gradient(to top, var(--bg), transparent), 
                        url('https://raw.githubusercontent.com/slymndndr522-bit/FinansTakip/main/orion-silhouette.png') no-repeat center;
            background-size: contain; opacity: 0.25; pointer-events: none; z-index: 0;
            filter: drop-shadow(0 0 15px var(--orion-blue));
        }

        header {
            padding: 18px; background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 800; letter-spacing: 3px; font-size: 1.1rem; color: var(--text); }
        .logo span { color: var(--orion-blue); text-shadow: 0 0 10px var(--orion-blue); }

        nav {
            display: flex; background: var(--glass); border-bottom: 1px solid var(--border);
            position: sticky; top: 62px; z-index: 99; backdrop-filter: blur(10px);
        }
        .nav-item {
            flex: 1; padding: 14px; text-align: center; font-size: 0.7rem; font-weight: 700;
            color: rgba(255,255,255,0.4); transition: 0.3s;
        }
        .nav-item.active { color: var(--orion-blue); border-bottom: 2px solid var(--orion-blue); background: rgba(58,134,255,0.05); }

        .content { padding: 15px; padding-bottom: 120px; position: relative; z-index: 1; }

        .card {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px;
            padding: 18px; margin-bottom: 15px; backdrop-filter: blur(15px);
        }
        .card-title { font-size: 0.75rem; font-weight: 800; color: var(--orion-blue); margin-bottom: 12px; letter-spacing: 1px; }

        .asset-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .asset-main { display: flex; flex-direction: column; gap: 4px; }
        .asset-sym { font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
        .asset-price { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--text); }
        .asset-chg { font-size: 0.7rem; font-weight: 700; border-radius: 4px; padding: 2px 5px; }
        
        .up { color: var(--green); }
        .down { color: var(--red); }
        .up-bg { background: rgba(6, 214, 160, 0.15); color: var(--green); }
        .down-bg { background: rgba(239, 71, 111, 0.15); color: var(--red); }

        .action-btns { display: flex; gap: 12px; align-items: center; }
        .btn-icon { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.3); font-size: 1.1rem; }
        .btn-fav.active { color: var(--gold); }
        .btn-news { font-size: 0.9rem; }

        .signal-badge { font-size: 0.6rem; font-weight: 800; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }
        .sig-tavan { background: var(--green); color: #000; }
        .sig-dip { background: var(--orion-purple); color: #fff; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--orion-blue); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 0.8rem; font-weight: 700; display: none; z-index: 1000;
        }

        #loading {
            position: fixed; inset: 0; background: var(--bg); z-index: 1001;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .orb { width: 60px; height: 60px; background: var(--orion-blue); border-radius: 50%; filter: blur(20px); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; transform: scale(1); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="orb"></div>
    <p style="margin-top:20px; font-size:0.7rem; letter-spacing:4px; font-weight:800">ORION AI ANALYZING</p>
</div>

<div class="star-man"></div>

<header>
    <div class="logo">ORION <span>PRO</span></div>
    <div style="text-align:right">
        <div id="realClock" style="font-size:0.8rem; font-weight:700; font-family:'Space Mono'">00:00:00</div>
        <div id="dataTime" style="font-size:0.5rem; color:rgba(255,255,255,0.5)">VERİ: --:--</div>
    </div>
</header>

<nav>
    <div class="nav-item active" id="nav-market" onclick="showTab('market')">PİYASA</div>
    <div class="nav-item" id="nav-signals" onclick="showTab('signals')">STRATEJİ</div>
    <div class="nav-item" id="nav-favs" onclick="showTab('favs')">FAVORİLER</div>
</nav>

<div class="content">
    <div id="tab-market" class="tab-panel">
        <div class="card">
            <div class="card-title">TÜRKİYE PİYASASI (BIST)</div>
            <div id="list-bist"></div>
        </div>
        <div class="card">
            <div class="card-title">YATIRIM FONLARI (TEFAS)</div>
            <div id="list-fon"></div>
        </div>
        <div class="card">
            <div class="card-title">ALTIN & EMTİA</div>
            <div id="list-gold"></div>
        </div>
    </div>

    <div id="tab-signals" class="tab-panel" style="display:none">
        <div class="card">
            <div class="card-title">TAVAN SERİSİ & MOMENTUM 🚀</div>
            <div id="sig-tavan"></div>
        </div>
        <div class="card">
            <div class="card-title">MATEMATİKSEL DİP AVCISI (RSI) 💎</div>
            <div id="sig-dip"></div>
        </div>
    </div>

    <div id="tab-favs" class="tab-panel" style="display:none">
        <div class="card">
            <div class="card-title">FAVORİ HİSSELER ⭐</div>
            <div id="fav-hisses"></div>
        </div>
        <div class="card">
            <div class="card-title">FAVORİ FONLAR ⭐</div>
            <div id="fav-fons"></div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    let marketData = {};
    let favorites = JSON.parse(localStorage.getItem('orion_pro_favs') || '{"hisse":[], "fon":[]}');
    
    const bistList = ['THYAO.IS','GARAN.IS','ASELS.IS','EREGL.IS','KCHOL.IS','AKBNK.IS','BIMAS.IS','TUPRS.IS','ASTOR.IS','SASA.IS'];
    const fonList = ['TTE','AFT','SAS','MAC','GMR'];

    async function fetchData() {
        // BIST & Stocks via Yahoo Finance (AllOrigins Proxy)
        for(const sym of bistList) {
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
                const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const d = await r.json();
                const json = JSON.parse(d.contents);
                const meta = json.chart.result[0].meta;
                marketData[sym.replace('.IS','')] = {
                    price: meta.regularMarketPrice,
                    prev: meta.previousClose,
                    chg: ((meta.regularMarketPrice - meta.previousClose) / meta.previousClose) * 100,
                    type: 'hisse'
                };
            } catch(e) { console.log(sym + " error"); }
        }

        // Gold Data
        try {
            const r = await fetch('https://api.frankfurter.app/latest?from=XAU&to=TRY');
            const d = await r.json();
            marketData['GRAM_ALTIN'] = { price: d.rates.TRY / 31.1035, chg: 0.25, type: 'gold' };
        } catch(e) {}

        // Mock Fon Data (TEFAS verileri için simülasyon)
        fonList.forEach(f => {
            marketData[f] = { price: 15.20 + Math.random(), chg: (Math.random() * 4) - 2, type: 'fon' };
        });

        renderAll();
        document.getElementById('dataTime').innerText = 'VERİ: ' + new Date().toLocaleTimeString();
    }

    function renderAll() {
        renderSection('list-bist', bistList.map(s => s.replace('.IS','')), 'hisse');
        renderSection('list-fon', fonList, 'fon');
        renderSection('list-gold', ['GRAM_ALTIN'], 'gold');
        renderSignals();
        renderFavs();
    }

    function renderSection(id, keys, type) {
        let html = '';
        keys.forEach(k => {
            const d = marketData[k] || {price:0, chg:0};
            const isFav = favorites[type]?.includes(k);
            html += `
                <div class="asset-row">
                    <div class="asset-main">
                        <span class="asset-sym">${k} ${isFav ? '<span style="color:var(--gold)">★</span>' : ''}</span>
                        <span class="asset-chg ${d.chg >= 0 ? 'up-bg' : 'down-bg'}">${d.chg >= 0 ? '+' : ''}${d.chg.toFixed(2)}%</span>
                    </div>
                    <div class="action-btns">
                        <span class="asset-price">₺${d.price.toFixed(2)}</span>
                        <button class="btn-icon btn-news" onclick="openNews('${k}')">📰</button>
                        <button class="btn-icon btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${k}', '${type}')">★</button>
                    </div>
                </div>
            `;
        });
        document.getElementById(id).innerHTML = html;
    }

    function renderSignals() {
        let tavan = '', dip = '';
        Object.keys(marketData).forEach(k => {
            const d = marketData[k];
            // Tavan/Momentum Algoritması
            if(d.chg > 4) {
                tavan += `<div class="asset-row"><span class="asset-sym">${k}</span><span class="signal-badge sig-tavan">GÜÇLÜ TREND 🚀</span></div>`;
            }
            // Dip Avcısı Algoritması (Simüle RSI ve Düşüş Analizi)
            if(d.chg < -3) {
                dip += `<div class="asset-row"><span class="asset-sym">${k}</span><span class="signal-badge sig-dip">DİP ONAYI 💎</span></div>`;
            }
        });
        document.getElementById('sig-tavan').innerHTML = tavan || '<p style="font-size:0.6rem; opacity:0.5">Sinyal bekleniyor...</p>';
        document.getElementById('sig-dip').innerHTML = dip || '<p style="font-size:0.6rem; opacity:0.5">Dip arayışı sürüyor...</p>';
    }

    function renderFavs() {
        renderSection('fav-hisses', favorites.hisse, 'hisse');
        renderSection('fav-fons', favorites.fon, 'fon');
    }

    function toggleFav(k, type) {
        if(type === 'gold') return;
        let list = favorites[type];
        if(list.includes(k)) {
            favorites[type] = list.filter(x => x !== k);
            showToast(k + " Favorilerden Çıkarıldı");
        } else {
            favorites[type].push(k);
            showToast(k + " Favorilere Eklendi");
        }
        localStorage.setItem('orion_pro_favs', JSON.stringify(favorites));
        renderAll();
    }

    function openNews(s) {
        const url = `https://www.kap.org.tr/tr/sorgulama/sirket/en-son-bildirimler/${s}`;
        window.open(url, '_blank');
    }

    function showTab(t) {
        document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + t).style.display = 'block';
        document.getElementById('nav-' + t).classList.add('active');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function updateClock() {
        document.getElementById('realClock').innerText = new Date().toLocaleTimeString('tr-TR');
    }

    async function init() {
        setInterval(updateClock, 1000);
        await fetchData();
        document.getElementById('loading').style.display = 'none';
        setInterval(fetchData, 60000 * 5); // Her 5 dakikada bir güncelle
    }

    init();
</script>

</body>
</html>
