<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ORION Terminal - Kurumsal Portföy Takibi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto+Mono:wght@400;700&display=swap');
        
        :root {
            /* Foneria Tarzı Kurumsal Renk Paleti */
            --bg: #0A0F1E;
            --surface: #141A2E;
            --surface-hover: #1E253E;
            --border: #2A334D;
            --orion-blue: #3A86FF; /* Birincil Kurumsal Renk */
            --gold: #FFB703;
            --green: #06D6A0;
            --red: #EF476F;
            --text-primary: #F8F9FA;
            --text-secondary: #94A3B8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* Kurumsal Header */
        header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-weight: 800; letter-spacing: 1px; font-size: 1.1rem; color: var(--text-primary); }
        .logo span { color: var(--orion-blue); }

        /* Modern Alt Navigasyon */
        nav {
            display: flex;
            background: var(--surface);
            border-top: 1px solid var(--border);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 99;
            padding-bottom: env(safe-area-inset-bottom); /* iPhone Çentiği */
        }
        .nav-item {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .nav-item.active { color: var(--orion-blue); background: rgba(58,134,255,0.05); }
        .nav-icon { font-size: 1.2rem; }

        .content { padding: 15px; padding-bottom: 100px; }

        /* Kurumsal Kartlar */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .card-title { font-size: 0.75rem; font-weight: 700; color: var(--orion-blue); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* Sadeleştirilmiş Varlık Satırı */
        .asset-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        .asset-row:last-child { border-bottom: none; }
        
        .asset-main { display: flex; flex-direction: column; gap: 4px; }
        .asset-sym { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
        .asset-name { font-size: 0.7rem; color: var(--text-secondary); }
        
        .asset-values { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .asset-price { font-family: 'Roboto Mono', monospace; font-size: 1rem; color: var(--text-primary); }
        .asset-chg { font-size: 0.7rem; font-weight: 700; border-radius: 4px; padding: 2px 6px; }
        
        .up-bg { background: rgba(6, 214, 160, 0.1); color: var(--green); }
        .down-bg { background: rgba(239, 71, 111, 0.1); color: var(--red); }

        .action-btns { display: flex; gap: 10px; align-items: center; margin-top: 10px; justify-content: flex-end; }
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 1rem; transition: 0.2s; }
        .btn-fav.active { color: var(--gold); }

        /* Strateji Sinyalleri */
        .signal-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; }
        .signal-badge { font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        .sig-tavan { background: var(--green); color: #000; }
        .sig-dip { background: var(--orion-purple); color: #fff; }

        /* Toast & Loading */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--orion-blue); color: #fff; padding: 12px 25px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #loading { position: fixed; inset: 0; background: var(--bg); z-index: 1001; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--orion-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-size:0.75rem; color:var(--text-secondary); letter-spacing:1px">Sistem Senkronize Ediliyor...</p>
</div>

<header>
    <div class="logo">ORION <span>Terminal</span></div>
    <div style="text-align:right">
        <div id="realClock" style="font-size:0.9rem; font-weight:700; font-family:'Roboto Mono'">00:00:00</div>
        <div id="dataTime" style="font-size:0.55rem; color:var(--text-secondary)">VERİ: --:--</div>
    </div>
</header>

<nav>
    <div class="nav-item active" id="nav-market" onclick="showTab('market')">
        <span class="nav-icon">📊</span>
        <span>Piyasa</span>
    </div>
    <div class="nav-item" id="nav-signals" onclick="showTab('signals')">
        <span class="nav-icon">💡</span>
        <span>Strateji</span>
    </div>
    <div class="nav-item" id="nav-favs" onclick="showTab('favs')">
        <span class="nav-icon">⭐</span>
        <span>Takip Listem</span>
    </div>
</nav>

<div class="content">
    <div id="tab-market" class="tab-panel">
        <div class="card">
            <div class="card-title">BIST 100 Takip Listesi</div>
            <div id="list-bist"></div>
        </div>
        <div class="card">
            <div class="card-title">Makro & Emtia</div>
            <div id="list-other"></div>
        </div>
    </div>

    <div id="tab-signals" class="tab-panel" style="display:none">
        <div class="card"><div class="card-title">Momentum & Tavan Serisi 📈</div><div id="sig-tavan"></div></div>
        <div class="card"><div class="card-title">Dip Analizi (Tepki Alımı) 📉</div><div id="sig-dip"></div></div>
    </div>

    <div id="tab-favs" class="tab-panel" style="display:none">
        <div class="card"><div class="card-title">Özel Takip Listem ⭐</div><div id="list-favs"></div></div>
    </div>
</div>

<div id="toast"></div>

<script>
    // --- VERİ ÇEKME KODU (KORUNDU) ---
    let marketData = JSON.parse(localStorage.getItem('orion_cache') || '{}');
    let favorites = JSON.parse(localStorage.getItem('orion_pro_favs_v2') || '[]');
    
    // Sembol İsimlendirmeleri (Kurumsal görünüm için)
    const symNames = {
        'THYAO': 'Türk Hava Yolları', 'GARAN': 'Garanti BBVA', 'ASELS': 'Aselsan Elektronik', 
        'EREGL': 'Ereğli Demir Çelik', 'KCHOL': 'Koç Holding', 'AKBNK': 'Akbank T.A.Ş.', 
        'BIMAS': 'BİM Birleşik Mağazalar', 'TUPRS': 'Tüpraş Rafinerileri', 'ASTOR': 'Astor Enerji', 'SASA': 'Sasa Polyester'
    };
    const bistList = Object.keys(symNames).map(s => s + '.IS');

    async function fetchWithRetry(sym) {
        const proxies = [`https://api.allorigins.win/get?url=`, `https://corsproxy.io/?` ];
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
        
        for (let proxy of proxies) {
            try {
                const r = await fetch(proxy + encodeURIComponent(url));
                if (!r.ok) continue;
                const d = await r.json();
                const json = proxy.includes('allorigins') ? JSON.parse(d.contents) : d;
                const meta = json.chart.result[0].meta;
                return {
                    price: meta.regularMarketPrice,
                    chg: ((meta.regularMarketPrice - meta.previousClose) / meta.previousClose) * 100,
                    type: 'hisse'
                };
            } catch (e) { }
        }
        return null;
    }

    async function fetchData() {
        console.log("Senkronizasyon başladı...");
        for(const sym of bistList) {
            const data = await fetchWithRetry(sym);
            if (data) { marketData[sym.replace('.IS','')] = data; }
        }
        try { // Altın Verisi
            const r = await fetch('https://api.frankfurter.app/latest?from=XAU&to=TRY');
            const d = await r.json();
            marketData['GRAM_ALTIN'] = { price: d.rates.TRY / 31.1035, chg: 0.50, type: 'gold' };
        } catch(e) {}
        localStorage.setItem('orion_cache', JSON.stringify(marketData));
        renderAll();
        document.getElementById('dataTime').innerText = 'GÜNCEL: ' + new Date().toLocaleTimeString('tr-TR');
    }
    // ----------------------------------

    function renderSection(id, keys) {
        let html = '';
        keys.forEach(k => {
            const d = marketData[k];
            if(!d) return;
            const isFav = favorites.includes(k);
            html += `
                <div class="asset-row">
                    <div class="asset-main">
                        <span class="asset-sym">${k}</span>
                        <span class="asset-name">${symNames[k] || (k==='GRAM_ALTIN' ? 'Gram Altın (TL)' : '')}</span>
                    </div>
                    <div class="asset-values">
                        <span class="asset-price">₺${d.price.toLocaleString('tr-TR', {minimumFractionDigits: 2})}</span>
                        <span class="asset-chg ${d.chg >= 0 ? 'up-bg' : 'down-bg'}">${d.chg >= 0 ? '+' : ''}${d.chg.toFixed(2)}%</span>
                        <button class="btn-icon btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${k}')">★</button>
                    </div>
                </div>`;
        });
        document.getElementById(id).innerHTML = html || 'Veri aranıyor...';
    }

    function renderAll() {
        renderSection('list-bist', Object.keys(marketData).filter(k => marketData[k].type==='hisse'));
        renderSection('list-other', Object.keys(marketData).filter(k => marketData[k].type!=='hisse'));
        renderSignals();
        renderFavs();
    }

    function renderSignals() {
        let tavan = '', dip = '';
        Object.keys(marketData).forEach(k => {
            const d = marketData[k];
            if(d.chg > 2.5) tavan += `<div class="signal-card"><span class="asset-sym">${k}</span><span class="signal-badge sig-tavan">Yüksek Momentum</span></div>`;
            if(d.chg < -2.5) dip += `<div class="asset-row signal-card"><span class="asset-sym">${k}</span><span class="signal-badge sig-dip">Tepki Bölgesi</span></div>`;
        });
        document.getElementById('sig-tavan').innerHTML = tavan || 'Aktif sinyal bulunamadı.';
        document.getElementById('sig-dip').innerHTML = dip || 'Aktif sinyal bulunamadı.';
    }

    function renderFavs() { renderSection('list-favs', favorites); }
    function toggleFav(k) {
        if(favorites.includes(k)) { favorites = favorites.filter(x => x !== k); showToast(k + " Çıkarıldı"); }
        else { favorites.push(k); showToast(k + " Eklendi"); }
        localStorage.setItem('orion_pro_favs_v2', JSON.stringify(favorites));
        renderAll();
    }
    function showTab(t) {
        document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + t).style.display = 'block';
        document.getElementById('nav-' + t).classList.add('active');
    }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
    function startClock() { setInterval(() => { document.getElementById('realClock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000); }

    async function init() {
        startClock();
        renderAll(); // Önce cache göster
        setTimeout(() => { document.getElementById('loading').style.display='none'; }, 2500);
        await fetchData();
    }
    init();
</script>
</body>
</html>
